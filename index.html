<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>Document</title>
        <link rel="stylesheet" href="/dist/css/home-page.css" />

        <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    </head>
    <body>
        <div class="">
            <nav
                class="navbar navbar-expand-lg navbar-light bg-light border-bottom p-0"
            >
                <button
                    class="navbar-toggler ml-auto my-2 mr-2"
                    type="button"
                    data-toggle="collapse"
                    data-target="#navbarSupportedContent"
                    aria-controls="navbarSupportedContent"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div
                    class="collapse navbar-collapse border-top"
                    id="navbarSupportedContent"
                >
                    <ul class="navbar-nav bg-light py-1">
                        <li class="nav-item">
                            <button
                                type="button"
                                class="btn px-3 d-flex align-items-center w-100"
                                aria-label="menu"
                            >
                                <iconify-icon
                                    icon="bitcoin-icons:plus-filled"
                                    class="icon-lg text-pink"
                                ></iconify-icon>

                                <span class="mx-1">New</span>

                                <iconify-icon
                                    icon="oui:arrow-down"
                                    class="icon-md"
                                ></iconify-icon>
                            </button>
                        </li>

                        <li class="nav-item">
                            <button
                                type="button"
                                class="btn px-3 d-flex align-items-center w-100"
                                aria-label="menu"
                            >
                                <iconify-icon
                                    icon="fluent-mdl2:upload"
                                    class="icon-lg text-pink"
                                ></iconify-icon>

                                <span class="mx-1">Upload</span>

                                <iconify-icon
                                    icon="oui:arrow-down"
                                    class="icon-md"
                                ></iconify-icon>
                            </button>
                        </li>

                        <li class="nav-item ">
                            <button
                                type="button"
                                class="btn px-3 d-flex align-items-center w-100"
                                aria-label="menu"
                            >
                                <iconify-icon
                                    icon="fluent-mdl2:sync-to-p-c"
                                    class="icon-lg text-pink"
                                ></iconify-icon>

                                <span class="ml-2">Sync</span>
                            </button>
                        </li>

                        <li class="nav-item">
                            <button
                                type="button"
                                class="btn px-3 d-flex align-items-center w-100"
                                aria-label="menu"
                            >
                                <iconify-icon
                                    icon="vscode-icons:file-type-excel2"
                                    class="icon-lg "
                                ></iconify-icon>

                                <span class="ml-1"
                                    >Export to Excel</span
                                >
                            </button>
                        </li>

                        <li class="nav-item ">
                            <button
                                type="button"
                                class="btn px-3 d-flex align-items-center w-100"
                                aria-label="menu"
                            >
                                <iconify-icon
                                    icon="fluent:flow-20-regular"
                                    class="icon-lg text-pink"
                                ></iconify-icon>

                                <span class="mx-1">Flow</span>

                                <iconify-icon
                                    icon="oui:arrow-down"
                                    class="icon-md"
                                ></iconify-icon>
                            </button>
                        </li>

                        <li class="nav-item ">
                            <button
                                type="button"
                                class="btn px-3 d-flex align-items-center w-100"
                                aria-label="menu"
                            >
                                <iconify-icon
                                    icon="mynaui:dots-solid"
                                    class="icon-lg "
                                ></iconify-icon>
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>

            <div class="container-fluid mt-4">
                <h2 class="font-weight-light">Documents</h2>

                <table class="table table-borderless table-hover">
                    <thead class="">
                        <tr class="border-bottom border-2">
                            <th
                                class="border-top-0 align-items-center d-flex justify-content-end"
                            >
                                <iconify-icon
                                    icon="fluent:document-20-regular"
                                    class="icon-lg"
                                ></iconify-icon>
                            </th>
                            <th
                                class="font-weight-normal border-top-0"
                            >
                                <div
                                    class="d-flex align-items-center"
                                >
                                    <span>Name</span>

                                    <iconify-icon
                                        icon="oui:arrow-down"
                                        class="icon-md ml-1"
                                    ></iconify-icon>
                                </div>
                            </th>
                            <th
                                class="font-weight-normal border-top-0"
                            >
                                <div
                                    class="d-flex align-items-center"
                                >
                                    <span>Modified</span>

                                    <iconify-icon
                                        icon="oui:arrow-down"
                                        class="icon-md ml-1"
                                    ></iconify-icon>
                                </div>
                            </th>
                            <th
                                class="font-weight-normal border-top-0"
                            >
                                <div
                                    class="d-flex align-items-center"
                                >
                                    <span>Modified By</span>

                                    <iconify-icon
                                        icon="oui:arrow-down"
                                        class="icon-md ml-1"
                                    ></iconify-icon>
                                </div>
                            </th>

                            <th
                                class="font-weight-normal border-top-0"
                            >
                                <div
                                    class="d-flex align-items-center"
                                >
                                    <iconify-icon
                                        icon="bitcoin-icons:plus-filled"
                                        class="icon-md mr-1"
                                    ></iconify-icon>

                                    <span>Add column</span>
                                </div>
                            </th>
                        </tr>
                    </thead>

                    <tbody class="table-body">
                        <!-- Render data through JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <script src="/dist/js/home-page.js"></script>
        <script>
            const fileData = [
                {
                    name: 'CAS',
                    modified: 'April 30',
                    modifiedBy: 'Megan Bowen',
                    fileType: 'folder',
                },
                {
                    name: 'CoasterAndBargeLoading.xlsx',
                    modified: 'A few seconds ago',
                    modifiedBy: 'Administrator MOD',
                    fileType: 'excel',
                },
                {
                    name: 'RevenueByServices.xlsx',
                    modified: 'A few seconds ago',
                    modifiedBy: 'Administrator MOD',
                    fileType: 'excel',
                },
                {
                    name: 'RevenueByServices2016.xlsx',
                    modified: 'A few seconds ago',
                    modifiedBy: 'Administrator MOD',
                    fileType: 'excel',
                },
                {
                    name: 'RevenueByServices2017.xlsx',
                    modified: 'A few seconds ago',
                    modifiedBy: 'Administrator MOD',
                    fileType: 'excel',
                },
            ];

            const tableBody = document.querySelector('.table-body');

            const html = fileData
                .map(data => {
                    if (data.fileType === 'folder') {
                        return `<tr class="border-bottom">
                            <td
                                class="text-right"
                                data-label="File Type"
                            >
                                <iconify-icon
                                    icon="glyphs:folder-duo"
                                    class="icon-lg"
                                ></iconify-icon>
                            </td>
                            <td data-label="Name">${data.name}</td>
                            <td data-label="Modified">
                                ${data.modified}
                            </td>
                            <td data-label="Modified By">
                                ${data.modifiedBy}
                            </td>
                            <td></td>
                        </tr>`;
                    } else {
                        return `<tr class="border-bottom">
                            <td
                                class="text-right"
                                data-label="File Type"
                            >
                                <iconify-icon
                                    icon="vscode-icons:file-type-excel"
                                    class="icon-lg"
                                ></iconify-icon>
                            </td>
                            <td data-label="Name">
                                <div class="position-relative">
                                    <span class="glimmer">
                                        <iconify-icon
                                            icon="tabler:loader-quarter"
                                            class="icon-lg text-pink"
                                        ></iconify-icon>
                                    </span>

                                    ${data.name}
                                </div>
                            </td>
                            <td data-label="Modified">
                                ${data.modified}
                            </td>
                            <td data-label="Modified By">
                                ${data.modifiedBy}
                            </td>
                            <td></td>
                        </tr>`;
                    }
                })
                .join('');

            tableBody.innerHTML = html;
        </script>
    </body>
</html>
